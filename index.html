<!DOCTYPE html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Inscrições para o Workshop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ws-page">
      <div class="ws-card" role="main">
        <header class="ws-header">
          <span class="ws-badge">Workshop</span>
          <h1 class="ws-title">Alterações</h1>
        </header>

        <form class="ws-form" action="subscribe-ws" method="post" novalidate>
          <div class="field">
            <label for="username">
              Username <span class="required" aria-hidden="true">*</span>
            </label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Username"
              autocomplete="username"
              required
              aria-required="true"
            />
          </div>

          <div class="field">
            <label for="coach">
              Learning Coach <span class="required" aria-hidden="true">*</span>
            </label>
            <select id="coach" name="coach" required aria-required="true">
              <option value="" disabled selected>Seleciona o coach</option>
              <option value="Antonio Vasconcelos">Antonio Vasconcelos</option>
              <option value="Artur Monteiro">Artur Monteiro</option>
              <option value="Diogo Gonçalves">Diogo Gonçalves</option>
              <option value="Felisberto Mendonça">Felisberto Mendonça</option>
              <option value="Francisco Barbosa">Francisco Barbosa</option>
              <option value="Francisco Gameiro">Francisco Gameiro</option>
              <option value="Javiera Espinosa">Javiera Espinosa</option>
              <option value="Juan Aldana">Juan Aldana</option>
              <option value="Leonardo Ventura">Leonardo Ventura</option>
              <option value="Maria Madalena Santos">Maria Madalena Santos</option>
              <option value="Matilde Bandeira">Matilde Bandeira</option>
              <option value="Pedro Lopes">Pedro Lopes</option>
              <option value="Sandro Lima">Sandro Lima</option>
              <option value="Shira Guambe">Shira Guambe</option>
              <option value="Vasco Oliveira">Vasco Oliveira</option>
              <option value="William Rocha">William Rocha</option>
            </select>
          </div>

          <div class="field">
            <label for="grupo">
              Grupo <span class="required" aria-hidden="true">*</span>
            </label>
            <select id="grupo" name="grupo" required aria-required="true">
              <option value="" disabled selected>Seleciona o grupo</option>
              <option value="Grupo 1">Grupo 1</option>
              <option value="Grupo 2">Grupo 2</option>
              <option value="Grupo 3">Grupo 3</option>
              <option value="Grupo 4">Grupo 4</option>
              <option value="Grupo 5">Grupo 5</option>
              <option value="Grupo 6">Grupo 6</option>
              <option value="Grupo 7">Grupo 7</option>
              <option value="Grupo 8">Grupo 8</option>
            </select>
          </div>

          <div class="divider" role="separator"></div>

          <div class="field">
            <label for="workshop">
              Workshop <span class="required" aria-hidden="true">*</span>
            </label>
            <select id="workshop" name="workshop" required aria-required="true">
              <option value="" disabled selected>Seleciona o workshop</option>
              <option value="Fotografia">Fotografia</option>
              <option value="Cinema">Cinema</option>
              <option value="Desenvolvimento de Jogos">Desenvolvimento de Jogos</option>
              <option value="Programação">Programação</option>
              <option value="Robótica">Robótica</option>
              <option value="Animação">Animação</option>
              <option value="Design Gráfico">Design Gráfico</option>
              <option value="Música">Música</option>
            </select>
          </div>

          <div class="field">
            <label for="acao">
              Ação <span class="required" aria-hidden="true">*</span>
            </label>
            <select id="acao" name="acao" required aria-required="true">
              <option value="" disabled selected>Escolhe uma ação</option>
              <option value="Adicionar">Adicionar</option>
              <option value="Remover">Remover</option>
            </select>
          </div>

          <button type="submit" class="btn-submit">
            ENVIAR
            <span class="btn-arrow" aria-hidden="true">→</span>
          </button>
        </form>
      </div>
    </div>

    <script>
      document.querySelector('.ws-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const form = e.target;
        const submitBtn = form.querySelector('.btn-submit');

        // Basic client-side validation
        const fields = form.querySelectorAll('[required]');
        for (const field of fields) {
          if (!field.value) {
            alert('Por favor, preenche todos os campos obrigatórios.');
            field.focus();
            return;
          }
        }

        const payload = {
          username: form.username.value.trim(),
          coach: form.coach.value,
          grupo: form.grupo.value,
          workshop: form.workshop.value,
          acao: form.acao.value,
        };

        submitBtn.disabled = true;
        submitBtn.textContent = 'A enviar…';

        try {
          const response = await fetch('/api/subscribe-ws', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          const data = await response.json();

          if (response.ok) {
            alert('✅ Sucesso! A tua inscrição foi registada.');
            form.reset();
          } else {
            alert('❌ Erro: ' + (data.error || 'Ocorreu um problema. Tenta novamente.'));
          }
        } catch (err) {
          alert('❌ Erro de ligação. Verifica a tua internet e tenta novamente.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'ENVIAR <span class="btn-arrow" aria-hidden="true">→</span>';
        }
      });
    </script>
  </body>
</html>
